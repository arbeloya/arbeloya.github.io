<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>VTNC</title>

  <script>
    const config = {
      texto: "VAI TOMAR NO CU!",
      corTexto: "#FF0000",
      corFundo: "#000000",
      tamanhoFonte: "6.5rem",
      velocidade: "8s",
      usarCoresRGB: true,

      imagem1: "https://raw.githubusercontent.com/arbeloya/arbeloya.github.io/refs/heads/main/fing1.png",
      imagem2: "https://raw.githubusercontent.com/arbeloya/arbeloya.github.io/refs/heads/main/fing1.png",
      imagem3: "https://raw.githubusercontent.com/arbeloya/arbeloya.github.io/refs/heads/main/fing1.png",
      imagem4: "https://raw.githubusercontent.com/arbeloya/arbeloya.github.io/refs/heads/main/fing1.png",
        
      imagem1Tamanho: "20vw",
      imagem2Tamanho: "20vw",
      imagem3Tamanho: "20vw",
      imagem4Tamanho: "20vw",

      velocidadeRotacaoImagem: "3s"
    };
  </script>

  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        packages: ['base', 'ams', 'bbold', 'textgreek', 'upgreek']
      },
      svg: { fontCache: 'global' },
      startup: {
        pageReady: () => {
          MathJax.typesetPromise().then(() => {
            console.log("LaTeX renderizado com sucesso.");
          });
        }
      }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>

  <style>
    @font-face {
      font-family: 'Comic Sans MS';
      src: url('https://arbeloya.github.io/comic-sans-ms/comici.ttf') format('truetype');
    }

    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .scene {
      perspective: 1000px;
    }

    .text-3d {
      font-size: clamp(2rem, 5vw, var(--font-size));
      font-weight: bold;
      transform-style: preserve-3d;
      transform-origin: center center;
      position: relative;
      text-align: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      animation: rotateY var(--rotate-speed) linear infinite;
    }

    .text-3d .layer {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
    }

    @keyframes rotateY {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(-360deg); }
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .corner-image {
      position: absolute;
      z-index: 1;
      animation: rotateImage linear infinite;
      transform-origin: center center;
      height: auto;
    }

    @keyframes rotateImage {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    #img1 { top: 5vh; left: 5vw; }
    #img2 { top: 5vh; right: 5vw; }
    #img3 { bottom: 5vh; left: 5vw; }
    #img4 { bottom: 5vh; right: 5vw; }

    /* --- CSS DO CHAT ATUALIZADO --- */
    #chat-container {
      position: absolute;
      top: 1vh;
      left: 50%;
      transform: translateX(-50%);
      width: 90vw;
      max-width: 800px;
      background: rgba(0, 0, 0, 0.7);
      border: 3px solid #FFF;
      border-radius: 10px;
      padding: 10px;
      z-index: 100;
      display: flex;
      flex-direction: column;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      color: white;
    }

    #chat-messages {
      height: 32vh; /* Altura que você pediu */
      overflow-y: auto;
      margin-bottom: 10px;
      font-size: 16px;
      text-shadow: 1px 1px 2px black;
    }

    #chat-inputs {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    /* Melhora para Celular: sem zoom e com Comic Sans forçada */
    #chat-inputs input, #chat-inputs button {
      font-family: 'Comic Sans MS', cursive, sans-serif !important;
      font-size: 16px !important; 
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    #chat-inputs button {
      background-color: #ff0000;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .chat-msg { margin-bottom: 8px; word-wrap: break-word; text-align: left; line-height: 1.4; }
    .chat-user { font-weight: bold; color: #ffff00; }
    
    /* Estilo das imagens dentro do chat */
    .chat-img {
      max-width: 100%;
      max-height: 250px;
      border-radius: 5px;
      margin-top: 5px;
      border: 1px solid #fff;
      display: block;
    }

    /* --- DENTRO DA MEDIA QUERY QUE JÁ EXISTE --- */
    @media screen and (max-width: 768px) {
      .scene {
        position: absolute; 
        top: 78vh; /* Desci um tiquinho mais o texto para dar espaço aos dedos */
        left: 50%;
        transform: translateX(-50%);
      }

      /* MOVE OS DEDOS DO TOPO PARA BAIXO DO CHAT */
      #img1, #img2 {
        top: 57vh !important; /* 48% da altura da tela coloca eles logo abaixo do botão de enviar */
      }
      
      /* Ajuste opcional: deixar eles um pouco mais "abertos" nas pontas */
      #img1 { left: 2vw; }
      #img2 { right: 2vw; }

      #img3, #img4 {
        /* Mudando de 5vh (PC) para apenas 1vh (quase colado no chão) */
        bottom: 1vh !important; 
      }
      /* Opcional: abrir um pouco mais eles nas laterais também */
      #img3 { left: 2vw; }
      #img4 { right: 2vw; }

      
      .text-3d {
        --font-size: 3.5rem; /* Ajuste para o texto não bater nos dedos novos */
      }
    }
    
  </style>
</head>
<body>

<img id="img1" class="corner-image" src="" alt="Imagem 1">
<img id="img2" class="corner-image" src="" alt="Imagem 2">
<img id="img3" class="corner-image" src="" alt="Imagem 3">
<img id="img4" class="corner-image" src="" alt="Imagem 4">

<audio id="backgroundMusic" loop>
  <source src="https://raw.githubusercontent.com/arbeloya/arbeloya.github.io/main/meucarro.mp3" type="audio/mp3">
</audio>

<canvas id="explosionCanvas"></canvas>

<div class="scene">
  <div class="text-3d" id="text3d"></div>
</div>
  
<div id="chat-container">
  <div id="chat-messages"></div>
  <div id="chat-inputs">
    <input type="text" id="chat-username" placeholder="Seu nome...">
    <input type="text" id="chat-text" placeholder="Digite sua mensagem...(Tem suporte para LaTeX, use $ código $)">
    <button id="chat-send">Enviar</button>
  </div>
</div>
  
<script>
  // Canvas RGB
  const canvas = document.getElementById('explosionCanvas');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let width, height;

  function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function createExplosion(x, y) {
    for (let i = 0; i < 30; i++) {
      particles.push({
        x: x, y: y,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        life: 100,
        radius: Math.random() * 4 + 2,
        color: `hsl(${Math.random() * 360}, 100%, 60%)`
      });
    }
  }

  function updateParticles() {
    particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.life--; });
    particles = particles.filter(p => p.life > 0);
  }

  function drawParticles() {
    ctx.clearRect(0, 0, width, height);
    particles.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
      ctx.fillStyle = p.color;
      ctx.fill();
    });
  }

  function loop() { updateParticles(); drawParticles(); requestAnimationFrame(loop); }
  loop();

  setInterval(() => {
    const centerX = width / 2 + (Math.random() - 0.5) * 200;
    const centerY = height / 2 + (Math.random() - 0.5) * 100;
    createExplosion(centerX, centerY);
  }, 600);

  const textElement = document.getElementById("text3d");
  document.documentElement.style.setProperty('--font-size', config.tamanhoFonte);
  document.documentElement.style.setProperty('--rotate-speed', config.velocidade);

  for (let z = -20; z <= 0; z += 2) {
    const span = document.createElement('span');
    span.className = `layer ${z === 0 ? 'front' : 'back'}`;
    span.style.transform = `translateX(-50%) translateZ(${z}px)`;
    span.style.opacity = z === 0 ? '1' : (1 + z / 20).toFixed(2);
    span.innerHTML = config.texto;
    textElement.appendChild(span);
  }

  if (config.usarCoresRGB) {
    let hue = 0;
    function updateColors() {
      const fg = `hsl(${hue}, 100%, 50%)`;
      const bg = `hsl(${(hue + 180) % 360}, 100%, 50%)`;
      document.body.style.backgroundColor = bg;
      textElement.style.color = fg;
      textElement.querySelectorAll('.layer').forEach(layer => layer.style.color = fg);
      hue = (hue + 0.5) % 360;
      requestAnimationFrame(updateColors);
    }
    updateColors();
  }

  const setImage = (id, src, size) => {
    const img = document.getElementById(id);
    img.src = src;
    img.style.width = size;
    img.style.animationDuration = config.velocidadeRotacaoImagem;
  };
  setImage('img1', config.imagem1, config.imagem1Tamanho);
  setImage('img2', config.imagem2, config.imagem2Tamanho);
  setImage('img3', config.imagem3, config.imagem3Tamanho);
  setImage('img4', config.imagem4, config.imagem4Tamanho);

  const music = document.getElementById('backgroundMusic');

  // Função única e robusta para o som
  const handleMusic = (e) => {
    // 1. Se o toque/clique for dentro do chat, ignora completamente
    if (e.target.closest('#chat-container')) {
      return; 
    }

    // 2. Tenta dar o play ou pause
    if (music.paused) {
      // O .play() retorna uma Promessa. Se o navegador bloquear, a gente avisa no console.
      music.play().catch(err => {
        console.warn("O navegador bloqueou o áudio. Tente clicar fora do chat novamente.");
      });
    } else {
      music.pause();
    }
  };

  // 'pointerdown' é o segredo: funciona instantaneamente no PC e no Celular
  document.addEventListener('pointerdown', handleMusic);
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBvVY5dBSKL_GVjooT_cXr9OYh8XbH64Mw",
    authDomain: "chat-rgb.firebaseapp.com",
    databaseURL: "https://chat-rgb-default-rtdb.firebaseio.com",
    projectId: "chat-rgb",
    storageBucket: "chat-rgb.firebasestorage.app",
    messagingSenderId: "100890193145",
    appId: "1:100890193145:web:bd9cf3fd1093bc041c8628"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const chatRef = ref(db, 'mensagens');
  const chatQuery = query(chatRef, limitToLast(50));

  const chatMessages = document.getElementById('chat-messages');
  const btnSend = document.getElementById('chat-send');
  const inputUser = document.getElementById('chat-username');
  const inputText = document.getElementById('chat-text');

  btnSend.onclick = () => {
      const nome = inputUser.value.trim() || 'Anônimo';
      const msg = inputText.value.trim();
      if(msg !== "") {
          push(chatRef, { nome: nome, texto: msg });
          inputText.value = '';
      }
  };

  inputText.addEventListener("keypress", (e) => { if (e.key === "Enter") btnSend.click(); });

  onChildAdded(chatQuery, (snapshot) => {
      const data = snapshot.val();
      const div = document.createElement('div');
      div.className = 'chat-msg';
      
      let textoFinal = data.texto;

      // Detector de links turbinado (Twitter, etc)
      const regexImagem = /(https?:\/\/[^\s]+(?:\.png|\.jpg|\.jpeg|\.gif|\.webp|format=png|format=jpg|format=jpeg|format=gif|format=webp)[^\s]*)/ig;
      textoFinal = textoFinal.replace(regexImagem, '<br><img src="$1" class="chat-img">');

      div.innerHTML = `<span class="chat-user">${data.nome}:</span> ${textoFinal}`;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;

      if (typeof MathJax !== 'undefined') {
          MathJax.typesetPromise([div]).catch((err) => console.log(err));
      }
  });
</script>

</body>
</html>
